syntax = "proto3";
package academy_clients;
import "google/protobuf/empty.proto";

message AcademyClientGrpcModel {
  string Id = 1;
  string Email = 2;
  bool HasPassword = 3;
  int64 CreatedAt = 4;
  int64 UpdatedAt = 5;
}

message CreateClientIfNotExistsRequest {
  string Email = 1;
}

message CreateClientIfNotExistsResponse {
  AcademyClientGrpcModel Client = 1;
  bool Created = 2;
}

enum SetPasswordStatusGrpc {
  SET_PASSWORD_OK = 0;
  SET_PASSWORD_CLIENT_NOT_FOUND = 1;
  SET_PASSWORD_ALREADY_SET = 2;
}

message SetPasswordRequest {
  string ClientId = 1;
  string Password = 2;
}

message SetPasswordResponse {
  SetPasswordStatusGrpc Status = 1;
}

enum VerifyPasswordStatusGrpc {
  VERIFY_OK = 0;
  VERIFY_INVALID_CREDENTIALS = 1;
  VERIFY_PASSWORD_NOT_SET = 2;
}

message VerifyPasswordRequest {
  string Email = 1;
  string Password = 2;
}

message VerifyPasswordResponse {
  VerifyPasswordStatusGrpc Status = 1;
  optional string ClientId = 2;
}

message GetClientByEmailRequest {
  string Email = 1;
}

message GetClientByIdRequest {
  string Id = 1;
}

message GetClientResponse {
  optional AcademyClientGrpcModel Client = 1;
}

enum GenerateResetCodeStatusGrpc {
  GENERATE_RESET_CODE_OK = 0;
  GENERATE_RESET_CODE_CLIENT_NOT_FOUND = 1;
}

message GenerateResetCodeRequest {
  string Email = 1;
}

message GenerateResetCodeResponse {
  GenerateResetCodeStatusGrpc Status = 1;
  optional string ClientId = 2;
  optional string Code = 3;
  optional int64 ExpiresAt = 4;
}

enum ResetPasswordWithCodeStatusGrpc {
  RESET_PASSWORD_OK = 0;
  RESET_PASSWORD_CLIENT_NOT_FOUND = 1;
  RESET_PASSWORD_INVALID_CODE = 2;
  RESET_PASSWORD_EXPIRED = 3;
}

message ResetPasswordWithCodeRequest {
  string Email = 1;
  string Code = 2;
  string NewPassword = 3;
}

message ResetPasswordWithCodeResponse {
  ResetPasswordWithCodeStatusGrpc Status = 1;
}

message ListClientsRequest {
  int32 Limit = 1;
  int32 Offset = 2;
  optional string EmailQuery = 3;
}

message ListClientsResponse {
  repeated AcademyClientGrpcModel Clients = 1;
}

message GetClientsByIdsRequest {
  repeated string Ids = 1;
}

message GetClientsByIdsResponse {
  repeated AcademyClientGrpcModel Clients = 1;
}

service AcademyClientsGrpcService {
  rpc CreateClientIfNotExists(CreateClientIfNotExistsRequest) returns (CreateClientIfNotExistsResponse);
  rpc SetPassword(SetPasswordRequest) returns (SetPasswordResponse);
  rpc VerifyPassword(VerifyPasswordRequest) returns (VerifyPasswordResponse);
  rpc GetClientByEmail(GetClientByEmailRequest) returns (GetClientResponse);
  rpc GetClientById(GetClientByIdRequest) returns (GetClientResponse);
  rpc GetClientsByIds(GetClientsByIdsRequest) returns (GetClientsByIdsResponse);
  rpc ListClients(ListClientsRequest) returns (ListClientsResponse);
  rpc GenerateResetCode(GenerateResetCodeRequest) returns (GenerateResetCodeResponse);
  rpc ResetPasswordWithCode(ResetPasswordWithCodeRequest) returns (ResetPasswordWithCodeResponse);
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
