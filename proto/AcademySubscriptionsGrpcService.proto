syntax = "proto3";
package academy_subscriptions;
import "google/protobuf/empty.proto";

enum AcademySubscriptionStatusGrpc {
  ACTIVE = 0;
  SUSPENDED = 1;
  CANCELLED = 2;
  BLOCKED = 3;
}

message AcademySubscriptionGrpcModel {
  string Id = 1;
  string ClientId = 2;
  string ExternalId = 3;
  AcademySubscriptionStatusGrpc Status = 4;
  string ProductCode = 5;
  int64 StartedAt = 6;
  optional int64 ExpiresAt = 7;
  optional int64 CancelledAt = 8;
  int64 CreatedAt = 9;
  int64 UpdatedAt = 10;
  optional string ExternalBuyerId = 11;
}

message GetByClientIdRequest {
  string ClientId = 1;
}

message GetSubscriptionResponse {
  optional AcademySubscriptionGrpcModel Subscription = 1;
}

enum CancelSubscriptionStatusGrpc {
  CANCEL_OK = 0;
  CANCEL_NOT_FOUND = 1;
  CANCEL_NO_BUYER = 2;
  CANCEL_NOT_ACTIVE = 3;
}

message CancelSubscriptionRequest {
  string ClientId = 1;
  string Ip = 2;
}

message CancelSubscriptionResponse {
  CancelSubscriptionStatusGrpc Status = 1;
}

message CreateSubscriptionRequest {
  string ClientId = 1;
  string ProductCode = 2;
  string ExternalSubscriptionId = 3;
  optional string ExternalBuyerId = 4;
  optional int64 ExpiresAt = 5;
}

message CreateSubscriptionResponse {
  AcademySubscriptionGrpcModel Subscription = 1;
}

message ListSubscriptionsRequest {
  int32 Limit = 1;
  int32 Offset = 2;
  optional AcademySubscriptionStatusGrpc Status = 3;
}

message ListSubscriptionsResponse {
  repeated AcademySubscriptionGrpcModel Subscriptions = 1;
  int64 Total = 2;
}

service AcademySubscriptionsGrpcService {
  rpc GetByClientId(GetByClientIdRequest) returns (GetSubscriptionResponse);
  rpc CancelSubscription(CancelSubscriptionRequest) returns (CancelSubscriptionResponse);
  rpc CreateSubscription(CreateSubscriptionRequest) returns (CreateSubscriptionResponse);
  rpc ListSubscriptions(ListSubscriptionsRequest) returns (ListSubscriptionsResponse);
  rpc Ping(google.protobuf.Empty) returns (google.protobuf.Empty);
}
